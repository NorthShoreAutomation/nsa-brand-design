name: release

# Single-phase, label-driven release + Pages deploy.
#
# Trigger: every push to main (typically a merged PR).
#
#   1. Always: build dist/nsa.css fresh, stage the site, deploy to Pages
#      (Pages source must be set to "GitHub Actions" in repo settings).
#   2. If the merging PR carried release:major | release:minor | release:patch:
#      compute new vX.Y.Z from the most recent v* tag, create an annotated
#      tag with the [Unreleased] CHANGELOG content as the message, and
#      create a GitHub Release with dist/nsa.css attached.
#
# Nothing is committed back to main. The org ruleset `nsa-protect-default-
# branch` is branch-scoped, so the tag push is not blocked.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_version:
        description: "Override version (e.g. 1.2.3) — emergency use only. Skips label/tag logic."
        required: false
        type: string

permissions:
  contents: write       # tag + release
  pull-requests: read   # look up merging PR labels
  pages: write          # deploy-pages
  id-token: write       # deploy-pages OIDC

concurrency:
  group: pages-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      released: ${{ steps.version.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history for git describe

      - name: Determine bump from merging PR labels
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ inputs.force_version }}
        run: |
          set -euo pipefail
          if [ -n "${FORCE}" ]; then
            echo "level=force" >> "$GITHUB_OUTPUT"
            echo "Force version requested: ${FORCE}"
            exit 0
          fi
          # Find the PR whose merge commit is this SHA. Works for squash,
          # rebase, and merge-commit strategies. Returns empty for direct
          # pushes (which shouldn't happen under the org ruleset).
          labels="$(gh pr list \
            --search "${GITHUB_SHA}" \
            --state merged \
            --base main \
            --json labels \
            --jq '[.[].labels[].name] | join(" ")' || true)"
          echo "PR labels for ${GITHUB_SHA}: ${labels:-<none>}"
          case "$labels" in
            *release:major*) level=major ;;
            *release:minor*) level=minor ;;
            *release:patch*) level=patch ;;
            *)               level=skip  ;;
          esac
          echo "level=$level" >> "$GITHUB_OUTPUT"
          echo "Bump level: $level"

      - name: Compute version
        id: version
        env:
          LEVEL: ${{ steps.bump.outputs.level }}
          FORCE: ${{ inputs.force_version }}
        run: |
          set -euo pipefail
          last="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo v0.0.0)"
          last="${last#v}"
          # Normalize legacy X.Y → X.Y.0
          case "$last" in
            *.*.*) ;;
            *.*)   last="${last}.0" ;;
            *)     last="${last}.0.0" ;;
          esac
          IFS=. read -r major minor patch <<<"$last"

          released=false
          new=""
          case "$LEVEL" in
            force)
              new="$FORCE"
              released=true
              ;;
            major) new="$((major+1)).0.0";              released=true ;;
            minor) new="${major}.$((minor+1)).0";       released=true ;;
            patch) new="${major}.${minor}.$((patch+1))"; released=true ;;
            skip)  new="$last" ;;
          esac

          echo "released=$released" >> "$GITHUB_OUTPUT"
          echo "version=$new"       >> "$GITHUB_OUTPUT"
          echo "tag=v$new"          >> "$GITHUB_OUTPUT"
          echo "last=$last"         >> "$GITHUB_OUTPUT"
          echo "Last: v${last} → New: v${new} (released=${released})"

      - name: Extract [Unreleased] block from CHANGELOG
        if: steps.version.outputs.released == 'true'
        id: notes
        run: |
          set -euo pipefail
          awk '
            /^## \[Unreleased\]/ { flag=1; next }
            flag && /^## \[/     { flag=0 }
            flag                  { print }
          ' CHANGELOG.md > /tmp/release_notes.md
          # Require at least one bullet — empty [Unreleased] under a release label is a mistake.
          if ! grep -qE '^- ' /tmp/release_notes.md; then
            echo "::error::[Unreleased] section has no bullets in CHANGELOG.md, but the PR was labeled for a release. Add entries under '## [Unreleased]' before merging."
            exit 1
          fi
          echo "=== Release notes for ${{ steps.version.outputs.tag }} ==="
          cat /tmp/release_notes.md
          echo "==========================================="

      - name: Build dist/nsa.css
        env:
          NSA_VERSION: ${{ steps.version.outputs.version }}
        run: ./build.sh

      - name: Stage Pages site
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -R tokens.css components.css fonts assets site index.html dist _site/
          # Inject real version into sidebar.js for the deployed copy only.
          sed "s|__NSA_VERSION__|v${VERSION}|g" sidebar.js > _site/sidebar.js
          echo "Staged _site/ for Pages deploy at v${VERSION}:"
          ls -la _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Create annotated tag
        if: steps.version.outputs.released == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists on origin. Refusing to overwrite."
            exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -F /tmp/release_notes.md
          git push origin "${TAG}"

      - name: Create GitHub Release
        if: steps.version.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "${TAG}" dist/nsa.css \
            --title "${TAG}" \
            --notes-file /tmp/release_notes.md

  deploy-pages:
    needs: build-and-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
