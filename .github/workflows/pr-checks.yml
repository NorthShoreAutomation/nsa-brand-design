name: pr-checks

# Advisory convention checks on every PR to main. Failures show as a
# red check on the PR but do NOT block merge (no required-status-check
# entry on the org ruleset). Treat the red ✕ as a prompt to look.
#
# Two gates:
#
#   1. Label discipline. Exactly one of release:major | release:minor |
#      release:patch | release:skip must be present.
#
#   2. CHANGELOG enforcement. If the PR is labeled release:major|minor|
#      patch, the [Unreleased] section of CHANGELOG.md must gain at
#      least one new bullet vs. origin/main. release:skip is exempt.
#
# No file-scope gate. Under the single-phase pipeline, there are no
# generated/managed files to protect on main — the workflow builds
# dist/nsa.css fresh in the runner and never commits back.

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  conventions:
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      LABELS:   ${{ toJson(github.event.pull_request.labels.*.name) }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: PR label discipline
        if: ${{ !cancelled() }}
        run: |
          set -u
          count=0
          for l in major minor patch skip; do
            if echo "$LABELS" | grep -q "\"release:$l\""; then
              count=$((count+1))
            fi
          done
          if [ "$count" -eq 0 ]; then
            echo "::error::PR must carry exactly one release:* label (release:major | release:minor | release:patch | release:skip). See CLAUDE.md → PR conventions."
            exit 1
          fi
          if [ "$count" -gt 1 ]; then
            echo "::error::PR carries multiple release:* labels; exactly one is required."
            exit 1
          fi
          echo "Label OK."

      - name: CHANGELOG [Unreleased] must add a new bullet
        if: ${{ !cancelled() }}
        run: |
          set -u
          # Only enforced for release-bearing labels. release:skip is exempt.
          if ! echo "$LABELS" | grep -qE '"release:(major|minor|patch)"'; then
            echo "Skipping (label is release:skip or absent)."
            exit 0
          fi
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md missing in PR head."
            exit 1
          fi
          extract() {
            awk '
              /^## \[Unreleased\]/ { flag=1; next }
              flag && /^## \[/     { flag=0 }
              flag                  { print }
            ' "$1"
          }
          git show "origin/${BASE_REF}:CHANGELOG.md" > /tmp/cl-base.md 2>/dev/null || : > /tmp/cl-base.md
          extract /tmp/cl-base.md > /tmp/u-base.md
          extract CHANGELOG.md    > /tmp/u-head.md
          base_bullets=$(grep -cE '^- ' /tmp/u-base.md 2>/dev/null || true)
          head_bullets=$(grep -cE '^- ' /tmp/u-head.md 2>/dev/null || true)
          : "${base_bullets:=0}"
          : "${head_bullets:=0}"
          if [ "$head_bullets" -le "$base_bullets" ]; then
            echo "::error file=CHANGELOG.md::release:major|minor|patch PRs must add at least one bullet under '## [Unreleased]'. Bullets in [Unreleased] — base: ${base_bullets}, head: ${head_bullets}."
            exit 1
          fi
          echo "CHANGELOG OK: [Unreleased] bullets ${base_bullets} → ${head_bullets}."
